<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f4fbf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="米糕记账">
  <meta name="description" content="米糕陪你记录每一笔日常支出与收入">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/black-shiba-mascot.png">
  <link rel="stylesheet" href="./styles.css">
  <title>米糕记账</title>
</head>
<body>
  <div id="app-shell" class="app-shell">
    <main id="page" class="page-host" aria-live="polite"></main>
    <div id="modal-root"></div>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item" data-tab="home" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img class="nav-glyph" src="./assets/icons/home.svg" alt="">
        </span><span>首页</span>
      </button>
      <button class="nav-item" data-tab="ledger" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img class="nav-glyph" src="./assets/icons/receipt-2.svg" alt="">
        </span><span>账单</span>
      </button>
      <button class="nav-add" data-action="add" type="button" aria-label="记一笔">
        <span class="nav-add-core" aria-hidden="true">
          <img class="nav-add-glyph" src="./assets/icons/pencil.svg" alt="">
        </span>
        <span class="nav-add-label">记一笔</span>
      </button>
      <button class="nav-item" data-tab="statistics" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img class="nav-glyph" src="./assets/icons/chart-pie.svg" alt="">
        </span><span>统计</span>
      </button>
      <button class="nav-item" data-tab="settings" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img class="nav-glyph" src="./assets/icons/user-circle.svg" alt="">
        </span><span>我的</span>
      </button>
    </nav>

    <div id="toast" class="toast" role="status"></div>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2abdb0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="米糕记账">
  <meta name="description" content="米糕陪你记录每一笔日常支出与收入">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/black-shiba-mascot.png">
  <link rel="stylesheet" href="./styles.css">
  <title>米糕记账</title>
</head>
<body>
  <div id="app-shell" class="app-shell">
    <main id="page" class="page-host" aria-live="polite"></main>
    <div id="modal-root"></div>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item" data-tab="home" type="button">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28">
            <path d="M5.5 12.8 14 5.2l8.5 7.6"></path>
            <path d="M8 11.6v10.2h12V11.6"></path>
            <path d="M11.5 21.8v-6h5v6"></path>
          </svg>
        </span><span>首页</span>
      </button>
      <button class="nav-item" data-tab="ledger" type="button">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28">
            <path d="M8.2 5.5h11.6a2 2 0 0 1 2 2v15l-2.4-1.4-2.4 1.4-2.4-1.4-2.4 1.4-2.4-1.4-2.4 1.4v-15a2 2 0 0 1 2-2Z"></path>
            <path d="M10.7 10.3h6.6"></path>
            <path d="M10.7 14h8.6"></path>
            <path d="M10.7 17.7h5.8"></path>
          </svg>
        </span><span>账单</span>
      </button>
      <button class="nav-add" data-action="add" type="button" aria-label="记一笔">
        <span class="nav-add-core" aria-hidden="true">
          <svg viewBox="0 0 28 28">
            <path d="m8.4 19.5 1.2-5 8.9-8.9a2.3 2.3 0 0 1 3.3 3.3l-8.9 8.9-5 1.2Z"></path>
            <path d="m16.8 7.4 3.8 3.8"></path>
            <path d="m9.6 14.5 3.3 3.3"></path>
          </svg>
        </span>
        <span class="nav-add-label">记一笔</span>
      </button>
      <button class="nav-item" data-tab="statistics" type="button">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28">
            <rect x="5.2" y="7.2" width="17.6" height="13.6" rx="2.2"></rect>
            <path d="M9.2 17.4v-3.2"></path>
            <path d="M14 17.4v-6"></path>
            <path d="M18.8 17.4v-8.1"></path>
            <path d="M8.7 21.9h10.6"></path>
          </svg>
        </span><span>统计</span>
      </button>
      <button class="nav-item" data-tab="settings" type="button">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28">
            <path d="M14 13.7c2.3 0 4.1-1.8 4.1-4.1S16.3 5.5 14 5.5s-4.1 1.8-4.1 4.1 1.8 4.1 4.1 4.1Z"></path>
            <path d="M6.8 22.5c.8-3.7 3.4-5.7 7.2-5.7s6.4 2 7.2 5.7"></path>
            <path d="M8.9 7.2c-1.7.4-2.9 1.7-3.3 3.3"></path>
            <path d="M19.1 7.2c1.7.4 2.9 1.7 3.3 3.3"></path>
          </svg>
        </span><span>我的</span>
      </button>
    </nav>

    <div id="toast" class="toast" role="status"></div>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>
